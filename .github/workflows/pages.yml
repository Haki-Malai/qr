name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      redirect_target:
        description: 'Leave empty for quotes. Use an http(s) URL to redirect there, or text like %monkey% to match the first image under public/redirect-assets.'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Prepare deploy config
        env:
          REDIRECT_TARGET: ${{ github.event.inputs.redirect_target || '' }}
        run: node scripts/prepare-deploy-config.mjs
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
