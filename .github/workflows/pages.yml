name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'What should this deploy do?'
        required: true
        default: 'auto - infer from redirect_target'
        type: choice
        options:
          - 'auto - infer from redirect_target'
          - 'quotes - deploy the motivational quotes app'
          - 'redirect - deploy the redirect app'
      redirect_target:
        description: 'Optional redirect target URL or file path under public/redirect-assets.'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Prepare deploy config
        env:
          DEPLOY_VERSION: ${{ github.event.inputs.deploy_mode || 'auto - infer from redirect_target' }}
          REDIRECT_TARGET: ${{ github.event.inputs.redirect_target || '' }}
        run: node scripts/prepare-deploy-config.mjs
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
